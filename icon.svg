<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22"
        fill="none" stroke="#89b4fa" stroke-width="3" opacity="0.6"/>
  <text x="64" y="56" font-family="Helvetica, Arial, sans-serif" font-size="30"
        font-weight="bold" fill="#89b4fa" text-anchor="middle">FLAC</text>
  <!-- spectrum bars: full bars on the left (audible band) decay to almost
       nothing on the right (above the lossy cutoff) — the visual story of
       what the scanner detects. -->
